<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syncreator — Beauty & Wellness Growth Agency</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ink: #0D0B09;
  --paper: #F8F4EE;
  --gold: #C4923A;
  --gold-pale: #F0E3CC;
  --gold-dim: #8A6428;
  --rust: #B84A2A;
  --sage: #4A7A52;
  --muted: #7A6E62;
  --line: #E0D8CE;
  --white: #FFFFFF;
}

body {
  background: var(--paper);
  font-family: 'Outfit', sans-serif;
  color: var(--ink);
  min-height: 100vh;
}

.page {
  max-width: 860px;
  margin: 0 auto;
  padding: 56px 52px 48px;
  position: relative;
}

/* Corner brackets */
.page::before, .page::after {
  content: '';
  position: absolute;
  width: 48px; height: 48px;
  border-color: var(--gold);
  border-style: solid;
  opacity: 0.5;
}
.page::before { top: 24px; left: 24px; border-width: 1.5px 0 0 1.5px; }
.page::after { bottom: 24px; right: 24px; border-width: 0 1.5px 1.5px 0; }

/* ── HEADER ── */
header {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 24px;
  padding-bottom: 32px;
  margin-bottom: 36px;
  border-bottom: 1px solid var(--line);
  animation: fadeUp 0.6s ease both;
}

.logo-area { }

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 3.2rem;
  font-weight: 700;
  letter-spacing: -1.5px;
  line-height: 1;
  color: var(--ink);
}
.logo span { color: var(--gold); }

.logo-sub {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 8px;
}

.header-right {
  text-align: right;
}

.identity-pill {
  display: inline-block;
  background: var(--ink);
  color: var(--gold-pale);
  padding: 8px 16px;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.credential-line {
  font-size: 0.75rem;
  color: var(--muted);
  line-height: 1.5;
}
.credential-line strong {
  color: var(--gold-dim);
  font-weight: 600;
}

/* ── POSITIONING STATEMENT ── */
.positioning {
  margin-bottom: 36px;
  animation: fadeUp 0.6s 0.08s ease both;
}

.pos-statement {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.65rem;
  font-weight: 600;
  line-height: 1.45;
  color: var(--ink);
  max-width: 640px;
  margin-bottom: 14px;
}

.pos-statement em {
  font-style: italic;
  color: var(--gold);
}

.pos-desc {
  font-size: 0.85rem;
  color: var(--muted);
  line-height: 1.7;
  max-width: 580px;
  border-left: 2px solid var(--gold);
  padding-left: 16px;
}

/* ── UNIQUE MECHANISM ── */
.mechanism {
  background: var(--ink);
  padding: 28px 32px;
  margin-bottom: 32px;
  animation: fadeUp 0.6s 0.12s ease both;
}

.mech-label {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
}

.mech-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--paper);
  margin-bottom: 18px;
  line-height: 1.3;
}

.mech-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: rgba(255,255,255,0.08);
}

.mech-step {
  background: var(--ink);
  padding: 16px;
  position: relative;
}

.mech-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  font-weight: 700;
  color: rgba(196,146,58,0.25);
  line-height: 1;
  margin-bottom: 6px;
}

.mech-step-title {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--gold-pale);
  margin-bottom: 4px;
}

.mech-step-desc {
  font-size: 0.7rem;
  color: rgba(248,244,238,0.5);
  line-height: 1.5;
}

.mech-arrow {
  position: absolute;
  right: -8px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gold);
  font-size: 0.8rem;
  z-index: 2;
}

/* ── SERVICES ── */
.services-section {
  margin-bottom: 32px;
  animation: fadeUp 0.6s 0.16s ease both;
}

.section-eyebrow {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-eyebrow::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--line);
}

.services-stack {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.service-row {
  display: grid;
  grid-template-columns: 200px 1fr auto;
  align-items: stretch;
  background: var(--white);
  border: 1px solid var(--line);
  transition: border-color 0.2s;
  overflow: hidden;
}

.service-row:hover {
  border-color: var(--gold);
}

.service-left {
  padding: 18px 20px;
  border-right: 1px solid var(--line);
  background: #FDFAF5;
}

.service-tier {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 4px;
}

.service-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 6px;
}

.service-price {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--rust);
}
.service-price span {
  font-size: 0.68rem;
  font-weight: 400;
  color: var(--muted);
}

.service-middle {
  padding: 18px 20px;
}

.service-unique {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 10px;
  padding: 8px 10px;
  background: var(--gold-pale);
  border-left: 2px solid var(--gold);
}

.unique-label {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold-dim);
  white-space: nowrap;
  margin-top: 1px;
  flex-shrink: 0;
}

.unique-text {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.4;
}

.service-includes {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.include-tag {
  font-size: 0.68rem;
  color: var(--muted);
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 3px 8px;
  border-radius: 2px;
}

.service-right {
  padding: 18px 16px;
  border-left: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 6px;
  min-width: 80px;
  background: #FDFAF5;
}

.target-label {
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
}

.target-client {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--ink);
  text-align: center;
  line-height: 1.4;
}

/* ── WHY DIFFERENT ── */
.why-section {
  margin-bottom: 32px;
  animation: fadeUp 0.6s 0.2s ease both;
}

.why-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 2px;
}

.why-card {
  background: var(--white);
  border: 1px solid var(--line);
  padding: 18px 18px;
  position: relative;
}

.why-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 2px;
  background: var(--gold);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.why-card:hover::before { transform: scaleX(1); }

.why-icon { font-size: 1.2rem; margin-bottom: 8px; }

.why-title {
  font-weight: 700;
  font-size: 0.82rem;
  color: var(--ink);
  margin-bottom: 5px;
}

.why-desc {
  font-size: 0.74rem;
  color: var(--muted);
  line-height: 1.6;
}

/* ── FOUNDER ── */
.founder {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 20px;
  align-items: center;
  padding: 20px 24px;
  background: var(--white);
  border: 1px solid var(--line);
  margin-bottom: 28px;
  animation: fadeUp 0.6s 0.24s ease both;
}

.founder-avatar {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold) 0%, #E8C87A 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--ink);
  flex-shrink: 0;
}

.founder-name {
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--ink);
  margin-bottom: 2px;
}

.founder-creds {
  font-size: 0.75rem;
  color: var(--muted);
  line-height: 1.5;
}

.founder-creds strong { color: var(--gold-dim); font-weight: 600; }

.founder-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 8px;
}

.founder-tag {
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--gold-dim);
  background: var(--gold-pale);
  padding: 3px 8px;
}

/* ── FOOTER CTA ── */
footer {
  background: var(--ink);
  padding: 28px 32px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 24px;
  animation: fadeUp 0.6s 0.28s ease both;
}

.cta-left { }

.cta-headline {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--paper);
  margin-bottom: 10px;
  line-height: 1.3;
}

.cta-headline em { font-style: italic; color: var(--gold); }

.contacts {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.contact {
  font-size: 0.75rem;
  color: rgba(248,244,238,0.55);
  display: flex;
  align-items: center;
  gap: 6px;
}
.contact strong { color: var(--gold); font-weight: 500; }

.cta-btn {
  background: var(--gold);
  color: var(--ink);
  padding: 14px 24px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  white-space: nowrap;
  transition: all 0.25s ease;
}
.cta-btn:hover { background: var(--gold-pale); transform: translateY(-1px); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 680px) {
  .page { padding: 36px 20px; }
  .logo { font-size: 2.4rem; }
  header { grid-template-columns: 1fr; }
  .header-right { text-align: left; }
  .mech-grid { grid-template-columns: 1fr 1fr; }
  .service-row { grid-template-columns: 1fr; }
  .service-right { border-left: none; border-top: 1px solid var(--line); flex-direction: row; justify-content: flex-start; }
  .why-grid { grid-template-columns: 1fr; }
  footer { grid-template-columns: 1fr; }
}

@media print {
  .page::before, .page::after { display: none; }
  * { animation: none !important; }
}
</style>
</head>
